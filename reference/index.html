<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reference · Media Helper AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (() => {
        const theme = localStorage.getItem('mha-theme') === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="../assets/logo-mark.svg" />
    <link rel="stylesheet" href="../assets/theme.css" />
  </head>
  <body class="text-slate-100">
    <div class="grid-pattern min-h-screen">
      <header class="border-b border-white/10 bg-slate-950/75 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
          <a href="../index.html" class="font-semibold">Media Helper AI</a>
          <nav class="flex gap-5 text-sm text-slate-300">
            <a href="../index.html">首页</a>
            <a href="../guide/index.html">指南</a>
            <a href="../examples/index.html">示例</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-6 py-10 lg:px-8">
        <div class="mb-6">
          <div class="text-sm uppercase tracking-[0.2em] text-cyan-300">Reference</div>
          <h1 class="mt-2 text-4xl font-black">评分字段与展示规范</h1>
        </div>

        <div class="grid gap-6 lg:grid-cols-2">
          <section class="glass rounded-3xl p-6">
            <h2 class="text-xl font-bold">推荐评分维度</h2>
            <div class="mt-4 overflow-hidden rounded-2xl border border-white/10">
              <table class="min-w-full text-left text-sm">
                <thead class="bg-slate-900/80">
                  <tr>
                    <th class="px-4 py-3">字段</th>
                    <th class="px-4 py-3">说明</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-white/10 bg-slate-950/40 text-slate-300">
                  <tr><td class="px-4 py-3">emotionScore</td><td class="px-4 py-3">情绪、痛点或争议强度</td></tr>
                  <tr><td class="px-4 py-3">activeScore</td><td class="px-4 py-3">关注人数与互动活跃度</td></tr>
                  <tr><td class="px-4 py-3">searchScore</td><td class="px-4 py-3">关键词搜索与潜在长尾流量</td></tr>
                  <tr><td class="px-4 py-3">competitionScore</td><td class="px-4 py-3">赛道竞争饱和程度</td></tr>
                  <tr><td class="px-4 py-3">fitScore</td><td class="px-4 py-3">与账号定位的匹配度</td></tr>
                  <tr><td class="px-4 py-3">monetizeScore</td><td class="px-4 py-3">涨粉与变现空间</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="glass rounded-3xl p-6">
            <h2 class="text-xl font-bold">展示组件</h2>
            <div class="mt-4 space-y-3 text-slate-300">
              <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">环形总分组件：突出综合结论</div>
              <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">评分表格：适合陈述理由与对比逻辑</div>
              <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">进度条图表：快速突出强项与弱项</div>
              <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">元数据卡片：承载时间、浏览量、关注量等信息</div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
