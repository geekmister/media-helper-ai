<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examples · Media Helper AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/theme.css" />
  </head>
  <body class="text-slate-100">
    <div class="grid-pattern min-h-screen">
      <header class="border-b border-white/10 bg-slate-950/75 backdrop-blur-xl">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
          <a href="../index.html" class="font-semibold">Media Helper AI</a>
          <nav class="flex gap-5 text-sm text-slate-300">
            <a href="../index.html">首页</a>
            <a href="../guide/index.html">指南</a>
            <a href="../reference/index.html">参考</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-6 py-10 lg:px-8">
        <div class="mb-6">
          <div class="text-sm uppercase tracking-[0.2em] text-emerald-300">Examples</div>
          <h1 class="mt-2 text-4xl font-black">更多可视化展示卡片</h1>
        </div>

        <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
          <article class="glass rounded-2xl p-5">
            <div class="text-sm text-slate-400">机会评级</div>
            <div class="mt-2 text-3xl font-black text-white">B-</div>
            <p class="mt-3 text-sm text-slate-300">适合做补充内容，不建议做核心增长突破口。</p>
          </article>
          <article class="glass rounded-2xl p-5">
            <div class="text-sm text-slate-400">内容建议</div>
            <div class="mt-2 text-lg font-semibold text-white">从争议切角切入</div>
            <p class="mt-3 text-sm text-slate-300">若必须回答，建议用对立观点和个人经历提升打开率。</p>
          </article>
          <article class="glass rounded-2xl p-5">
            <div class="text-sm text-slate-400">投放策略</div>
            <div class="mt-2 text-lg font-semibold text-white">降低资源占比</div>
            <p class="mt-3 text-sm text-slate-300">更适合作为矩阵补充，而非单点重押。</p>
          </article>
        </div>
      </main>
    </div>
  </body>
</html>
